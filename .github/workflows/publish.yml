name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade build

      - run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # PyPI Trusted Publishing reads this short-lived OIDC token from
      # GitHub Actions, verifies the claims against the Pending Publisher
      # configured on PyPI, and grants a one-shot publish credential.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  notify:
    needs: [build, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Discord notify
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          BUILD_STATUS: ${{ needs.build.result }}
          PUBLISH_STATUS: ${{ needs.publish.result }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 <<'PY'
          import json, os, urllib.request
          ok = os.environ["PUBLISH_STATUS"] == "success"
          body = json.dumps({"embeds":[{
              "title": f"{'✅' if ok else '❌'} {os.environ['REPO']} {os.environ['REF']}",
              "description": f"build: {os.environ['BUILD_STATUS']} / publish: {os.environ['PUBLISH_STATUS']}",
              "url": os.environ["RUN_URL"],
              "color": 3066993 if ok else 15158332,
          }]}).encode()
          req = urllib.request.Request(
              os.environ["WEBHOOK"], data=body,
              headers={"Content-Type": "application/json"})
          urllib.request.urlopen(req).read()
          PY
