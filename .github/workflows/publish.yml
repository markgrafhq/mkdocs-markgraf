name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade build

      - run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # PyPI Trusted Publishing reads this short-lived OIDC token from
      # GitHub Actions, verifies the claims against the Pending Publisher
      # configured on PyPI, and grants a one-shot publish credential.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  notify:
    needs: [build, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Discord notify
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          BUILD_STATUS: ${{ needs.build.result }}
          PUBLISH_STATUS: ${{ needs.publish.result }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$PUBLISH_STATUS" = "success" ]; then COLOR=3066993; EMOJI=":white_check_mark:"; else COLOR=15158332; EMOJI=":x:"; fi
          jq -n --arg title "$EMOJI $REPO $REF" \
                --arg desc "build: $BUILD_STATUS / publish: $PUBLISH_STATUS" \
                --arg url "$RUN_URL" \
                --argjson color "$COLOR" \
            '{embeds:[{title:$title,description:$desc,url:$url,color:$color}]}' \
            | curl -sS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"
